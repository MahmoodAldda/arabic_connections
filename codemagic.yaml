# Codemagic CI/CD pipeline for Arabic Connections
# Builds the iOS app and publishes it to TestFlight — no Mac required locally.
#
# BEFORE THE FIRST BUILD, in the Codemagic web UI you must:
#   1. Add an App Store Connect API key integration (Teams > Integrations > App Store Connect).
#      Name it EXACTLY "AppStoreConnectKey" (or change the name below to match).
#   2. Create the app record in App Store Connect, then put its numeric Apple ID
#      into APP_STORE_APP_ID below (e.g. 6480001234).
#
# The bundle identifier must match the one registered in your Apple Developer account:
#   com.mahmooda.arabicconnections

workflows:
  ios-testflight:
    name: iOS - TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: AppStoreConnectKey
    environment:
      vars:
        # Replace with your app's numeric Apple ID from App Store Connect
        # (App Store Connect > your app > App Information > "Apple ID").
        APP_STORE_APP_ID: 6786693634
        BUNDLE_ID: "com.mahmooda.arabicconnections"
      flutter: 3.44.4
    scripts:
      - name: Initialize keychain
        script: keychain initialize
      - name: Fetch or create signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add signing certificate to keychain
        script: keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Flutter analyze
        script: flutter analyze
      - name: Flutter unit tests
        script: flutter test
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID") + 1)) \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Add tester group names here to auto-notify testers, e.g.:
        # beta_groups:
        #   - Internal Testers
